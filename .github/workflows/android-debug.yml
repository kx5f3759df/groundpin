name: Android Debug Build

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install JS dependencies
        run: npm ci --no-audit --no-fund

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Verify JS bundle packaged in APK
        run: |
          set -euo pipefail
          apk=$(ls android/app/build/outputs/apk/debug/*.apk | head -1)
          unzip -l "$apk" | grep -E 'assets/(index\.android\.bundle|index\.bundle)'
          echo "OK: JS bundle found in $apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: groundpin-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  publish-android-pre-release:
    name: Publish Android Pre-release
    needs: android-debug
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: groundpin-android-debug-apk
          path: apk

      - name: Publish rolling pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-pre"
          SHORT_SHA="${GITHUB_SHA::7}"
          SRC=$(ls apk/*.apk | head -1)
          ASSET="groundpin-${TAG}-${SHORT_SHA}-android-debug.apk"
          cp "$SRC" "$ASSET"

          NOTES="$(cat <<EOF
          **Automated pre-release** — Android debug APK from \`${SHORT_SHA}\` on \`main\`.

          - Standalone install (JS bundle embedded; Metro not required)
          - Debug signing (not for Play Store)

          | | |
          |---|---|
          | Commit | [\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) |
          | Workflow run | [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |
          EOF
          )"

          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "$ASSET" \
            --prerelease \
            --title "GroundPin ${VERSION} Pre-release (Android Debug)" \
            --notes "$NOTES"
          echo "Published ${TAG} with ${ASSET}"
